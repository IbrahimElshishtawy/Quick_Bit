<body class="flex flex-col min-h-screen bg-background">
<!-- Main Content Area -->
<main class="flex-grow flex flex-col items-center justify-center px-lg py-2xl relative overflow-hidden">
<!-- Decorative Background Element -->
<div class="absolute -top-24 -right-24 w-64 h-64 bg-primary/10 rounded-full blur-3xl"></div>
<div class="absolute -bottom-24 -left-24 w-64 h-64 bg-tertiary/10 rounded-full blur-3xl"></div>
<!-- Back Button (Floating Anchor) -->
<div class="absolute top-12 left-md">
<a class="flex items-center justify-center w-12 h-12 bg-surface-container-lowest rounded-full shadow-sm text-on-surface hover:bg-surface-container-low transition-colors active:scale-95" href="#">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</a>
</div>
<!-- Forgot Password Container -->
<div class="w-full max-w-md z-10">
<!-- Icon/Illustration Section -->
<div class="flex flex-col items-center mb-xl">
<div class="w-24 h-24 bg-primary-container/20 rounded-3xl flex items-center justify-center mb-lg relative">
<!-- Rotating background ring effect -->
<div class="absolute inset-0 border-4 border-primary/20 border-t-primary rounded-3xl animate-[spin_4s_linear_infinite]"></div>
<div class="bg-surface-container-lowest p-md rounded-2xl shadow-md">
<span class="material-symbols-outlined text-primary text-[48px]" data-icon="lock_reset" style="font-variation-settings: 'FILL' 1;">lock_reset</span>
</div>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface text-center mb-sm">Forgot Password?</h1>
<p class="font-body-md text-body-md text-on-surface-variant text-center max-w-[280px]">
                    Enter your email address and we'll send you a link to reset your password.
                </p>
</div>
<!-- Form Section -->
<form class="space-y-lg" onsubmit="event.preventDefault(); return false;">
<!-- Email Field -->
<div class="space-y-sm">
<label class="font-label-lg text-label-lg text-on-surface-variant ml-xs" for="email">Email Address</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant group-focus-within:text-primary transition-colors" data-icon="mail">mail</span>
</div>
<input class="w-full h-14 bg-[#F1F3F5] rounded-xl pl-[52px] pr-md border-none focus:ring-2 focus:ring-primary/20 focus:bg-white focus:outline-none text-on-surface font-body-lg text-body-lg input-transition" id="email" placeholder="alex.rivera@campus.edu" type="email"/>
</div>
</div>
<!-- CTA Button -->
<button class="w-full h-14 bg-primary text-on-primary font-title-md text-title-md rounded-2xl shadow-lg hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-sm">
<span>Send Reset Link</span>
<span class="material-symbols-outlined text-[20px]" data-icon="send">send</span>
</button>
</form>
<!-- Footer Section -->
<div class="mt-2xl flex flex-col items-center gap-md">
<a class="font-label-lg text-label-lg text-primary flex items-center gap-xs hover:underline decoration-2 underline-offset-4" href="#">
<span class="material-symbols-outlined text-[18px]" data-icon="login">login</span>
                    Back to Login
                </a>
<!-- Alternative Help -->
<p class="font-label-sm text-label-sm text-on-surface-variant/60 pt-xl border-t border-surface-variant w-full text-center">
                    Need help? <a class="text-on-surface-variant font-semibold" href="#">Contact Support</a>
</p>

<!-- Micro-interaction Script -->
<script>
        // Simple input focus tracking for aesthetic feedback
        const emailInput = document.getElementById('email');
        const lockIconContainer = document.querySelector('.animate-\\[spin_4s_linear_infinite\\]');
        
        emailInput.addEventListener('focus', () => {
            lockIconContainer.style.animationDuration = '1.5s';
        });
        
        emailInput.addEventListener('blur', () => {
            lockIconContainer.style.animationDuration = '4s';
        });

        // Haptic-like feedback on button press
        const ctaBtn = document.querySelector('button');
        ctaBtn.addEventListener('click', () => {
            if (navigator.vibrate) {
                navigator.vibrate(10);
            }
            ctaBtn.innerHTML = `
                <span class="animate-spin h-5 w-5 border-2 border-white border-t-transparent rounded-full mr-2"></span>
                Sending...
            `;
            setTimeout(() => {
                ctaBtn.innerHTML = `
                    <span class="material-symbols-outlined text-[20px]" data-icon="check_circle">check_circle</span>
                    Link Sent!
                `;
                ctaBtn.classList.replace('bg-primary', 'bg-green-600');
            }, 1500);
        });
    </script>
