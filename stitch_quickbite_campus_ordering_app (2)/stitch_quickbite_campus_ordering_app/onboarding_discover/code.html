<style>
        body {
            background-color: #f9f9fc;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }
        .onboarding-gradient {
            background: radial-gradient(circle at top right, rgba(255, 107, 53, 0.08) 0%, transparent 40%),
                        radial-gradient(circle at bottom left, rgba(0, 103, 126, 0.05) 0%, transparent 40%);
        }
        .floating {
            animation: floating 6s ease-in-out infinite;
        }
        @keyframes floating {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }
        .ripple {
            position: relative;
            overflow: hidden;
        }

<body class="onboarding-gradient min-h-screen flex flex-col items-center justify-center p-md">
<!-- Onboarding Canvas (Suppressed Shell per "Destination Rule") -->
<main class="w-full max-w-[430px] h-[844px] bg-surface-container-lowest rounded-[40px] shadow-2xl relative flex flex-col overflow-hidden border border-surface-variant/30">
<!-- Header: Skip Button -->
<header class="flex justify-end p-lg z-20">
<button class="font-label-lg text-label-lg text-on-surface-variant hover:text-primary transition-colors py-sm px-md rounded-full bg-surface-container-low/50 backdrop-blur-sm">
                Skip
            </button>
</header>
<!-- Visual Content: 3D Illustration Placeholder -->
<section class="flex-1 flex flex-col items-center justify-center px-lg pt-sm">
<div class="relative w-full aspect-square flex items-center justify-center floating">
<!-- Using provided placeholder string for image -->
<img alt="Campus Ordering 3D Illustration" class="w-full h-full object-contain" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCCapxMjTjhOlSaaCQzbHt8ZsTqYT2vQmwuTUanLjsiaUybyhtvezUFX9O3eN_ZoP4xFOyPf4V5ziNJmj-EZ-Pz_9m6u1aDq0xiteYysbZZKl5Ar_GjNU_tCWYvRIq6pNq3kPABOhXvtJ0fpHGsyD7aeLGlTpDxafjfcxVH0jqOVo0_BHB-KZnM9PlzAWKTKG0DC_RGxXqLwhrGR8E9ETs-n-sIdkZbN8Q7-DI2vtAJrvQ5YhrHi8_fgTr-Il90D2KovG_irPBlNUw"/>
</div>
</section>
<!-- Text & Controls Area -->
<section class="bg-surface-container-lowest p-lg pb-xl rounded-t-[40px] shadow-[0_-8px_40px_rgba(0,0,0,0.02)] z-10 flex flex-col gap-lg">
<!-- Title and Subtitle -->
<div class="flex flex-col gap-sm text-center">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface tracking-tight">
                    Discover campus cafés
                </h1>
<p class="font-body-lg text-body-lg text-on-surface-variant px-md">
                    Find the best spots to grab a bite or a coffee across the entire campus.
                </p>
</div>
<!-- Progress & Navigation -->
<div class="flex flex-col gap-lg mt-md">
<!-- Progress Indicator (3 dots, 1st active) -->
<div class="flex justify-center items-center gap-xs">
<div class="w-6 h-2 rounded-full bg-primary transition-all duration-300"></div>
<div class="w-2 h-2 rounded-full bg-surface-variant transition-all duration-300"></div>
<div class="w-2 h-2 rounded-full bg-surface-variant transition-all duration-300"></div>
</div>
<!-- Next Button -->
<div class="flex justify-center">
<button class="group w-full max-w-[280px] h-14 bg-primary-container text-on-primary-container rounded-[24px] flex items-center justify-between px-6 shadow-lg shadow-primary-container/20 active:scale-[0.98] transition-all duration-200">
<span class="font-title-md text-title-md">Next</span>
<span class="material-symbols-outlined transition-transform group-hover:translate-x-1" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</div>
</section>
<!-- Subtle Ambient Elements -->
<div class="absolute -top-20 -left-20 w-64 h-64 bg-primary/5 rounded-full blur-[80px]"></div>
<div class="absolute -bottom-20 -right-20 w-80 h-80 bg-tertiary/5 rounded-full blur-[100px]"></div>
</main>
<!-- Micro-interaction Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const nextBtn = document.querySelector('button.group');
            const skipBtn = document.querySelector('header button');

            // Simple click feedback
            nextBtn.addEventListener('click', () => {
                nextBtn.style.opacity = '0.7';
                setTimeout(() => nextBtn.style.opacity = '1', 150);
                console.log('Navigating to next onboarding step...');
            });

            skipBtn.addEventListener('click', () => {
                console.log('Skipping onboarding...');
            });

            // Hover effects for progress dots
            const dots = document.querySelectorAll('.flex.justify-center.items-center.gap-xs div');
            dots.forEach((dot, idx) => {
                dot.addEventListener('mouseenter', () => {
                    if (idx !== 0) dot.classList.add('bg-primary/40');
                });
                dot.addEventListener('mouseleave', () => {
                    if (idx !== 0) dot.classList.remove('bg-primary/40');
                });
            });
        });
    </script>
