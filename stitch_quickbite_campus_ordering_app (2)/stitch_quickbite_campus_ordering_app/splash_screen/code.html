<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }

        @keyframes pulse-soft {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.9; }
        }

        @keyframes float-ui {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }

        @keyframes fade-in-up {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-pulse-logo {
            animation: pulse-soft 3s ease-in-out infinite;
        }

        .animate-float-illustration {
            animation: float-ui 4s ease-in-out infinite;
        }

        .animate-fade-in {
            animation: fade-in-up 1s ease-out forwards;
        }

        /* Loading Dots Animation */
        .loading-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #ab3500;
            display: inline-block;
            animation: dot-pulse 1.4s infinite ease-in-out both;
        }
        .loading-dot:nth-child(1) { animation-delay: -0.32s; }
        .loading-dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes dot-pulse {
            0%, 80%, 100% { transform: scale(0); opacity: 0.3; }
            40% { transform: scale(1); opacity: 1; }
        }

        body {
            background-color: #F8F9FA;
            overflow: hidden;
        }
    </style>
</head>
<body class="font-body-md text-on-surface">

<div class="flex flex-col items-center z-10 animate-fade-in" style="animation-delay: 0.2s;">

<p class="font-body-lg text-on-surface-variant mt-xs opacity-70">Swift Campus Dining</p>
</div>
<!-- Central Illustration -->
<div class="relative w-full flex justify-center items-center z-0 py-lg animate-float-illustration">
<div class="relative w-[320px] h-[320px] flex items-center justify-center">
<!-- Background soft glow -->
<div class="absolute w-[280px] h-[280px] bg-primary/5 rounded-full blur-3xl"></div>
<!-- Main 3D Delivery Illustration -->

</div>
</div>

<!-- Implicit Transition Logic -->
<script>
        // Micro-interaction: Subtle parallax on mouse/touch move
        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.pageX) / 45;
            const y = (window.innerHeight / 2 - e.pageY) / 45;
            const illustration = document.querySelector('.animate-float-illustration img');
            if (illustration) {
                illustration.style.transform = `translate(${x}px, ${y}px)`;
            }
        });

        // Simulate transition to next screen after delay
        window.addEventListener('load', () => {
            setTimeout(() => {
                // In a real app, this would trigger navigation
                console.log("Navigating to Dashboard...");
                // document.body.style.opacity = '0';
                // document.body.style.transition = 'opacity 0.8s ease-in-out';
            }, 3500);
        });
    </script>
