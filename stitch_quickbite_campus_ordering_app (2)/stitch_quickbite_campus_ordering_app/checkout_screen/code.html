<!DOCTYPE html>

        .glass-card {

            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);

        .hide-scrollbar {

            scrollbar-width: none;

            0% { transform: scale(0.95); opacity: 0; }
            50% { opacity: 0.3; }
            100% { transform: scale(1.05); opacity: 0; }
        }
        .btn-loading-ring {
            animation: pulse-ring 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
    </style>

<body class="bg-background text-on-background min-h-screen font-body-md flex flex-col">
<!-- Header Section -->
<header class="sticky top-0 w-full z-50 bg-surface/70 backdrop-blur-xl shadow-sm px-md h-16 flex items-center justify-between">
<button class="w-10 h-10 flex items-center justify-center rounded-full active:scale-95 transition-transform text-on-surface-variant">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-title-lg text-title-lg text-on-surface">Checkout</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<main class="flex-1 px-md py-lg space-y-xl pb-32">
<!-- Pickup Selector Section -->
<section class="space-y-md">
<div class="flex items-center justify-between">
<h2 class="font-title-md text-title-md text-on-surface">Pickup Time</h2>
<span class="font-label-lg text-label-lg text-primary">View Schedule</span>
</div>
<div class="flex overflow-x-auto hide-scrollbar gap-sm -mx-md px-md">
<button class="time-chip flex-shrink-0 px-lg py-sm rounded-full bg-primary text-on-primary font-label-lg transition-all active:scale-95 shadow-sm" onclick="selectTime(this)">
                    As soon as possible
                </button>
<button class="time-chip flex-shrink-0 px-lg py-sm rounded-full bg-surface-container-high text-on-surface-variant font-label-lg transition-all active:scale-95" onclick="selectTime(this)">
                    12:30 PM
                </button>
<button class="time-chip flex-shrink-0 px-lg py-sm rounded-full bg-surface-container-high text-on-surface-variant font-label-lg transition-all active:scale-95" onclick="selectTime(this)">
                    12:45 PM
                </button>
<button class="time-chip flex-shrink-0 px-lg py-sm rounded-full bg-surface-container-high text-on-surface-variant font-label-lg transition-all active:scale-95" onclick="selectTime(this)">
                    1:00 PM
                </button>
<button class="time-chip flex-shrink-0 px-lg py-sm rounded-full bg-surface-container-high text-on-surface-variant font-label-lg transition-all active:scale-95" onclick="selectTime(this)">
                    1:15 PM
                </button>
</div>
</section>
<!-- Payment Method Section -->
<section class="space-y-md">
<h2 class="font-title-md text-title-md text-on-surface">Payment Method</h2>
<div class="space-y-sm">
<!-- Google Pay -->
<label class="relative flex items-center justify-between p-md bg-surface-container-lowest rounded-xl border-2 border-transparent has-[:checked]:border-primary transition-all shadow-[0_4px_20px_rgba(0,0,0,0.04)] cursor-pointer">
<div class="flex items-center gap-md">
<div class="w-10 h-10 flex items-center justify-center bg-on-background text-surface rounded-lg">
<span class="material-symbols-outlined">google</span>
</div>
<span class="font-label-lg text-on-surface">Google Pay</span>
</div>
<input checked="" class="w-5 h-5 text-primary focus:ring-primary border-outline-variant" name="payment" type="radio"/>
</label>
<!-- Card -->
<label class="relative flex items-center justify-between p-md bg-surface-container-lowest rounded-xl border-2 border-transparent has-[:checked]:border-primary transition-all shadow-[0_4px_20px_rgba(0,0,0,0.04)] cursor-pointer">
<div class="flex items-center gap-md">
<div class="w-10 h-10 flex items-center justify-center bg-secondary-container text-on-secondary-container rounded-lg">
<span class="material-symbols-outlined">credit_card</span>
</div>
<span class="font-label-lg text-on-surface">Visa •••• 4242</span>
</div>
<input class="w-5 h-5 text-primary focus:ring-primary border-outline-variant" name="payment" type="radio"/>
</label>
<!-- Student ID -->
<label class="relative flex items-center justify-between p-md bg-surface-container-lowest rounded-xl border-2 border-transparent has-[:checked]:border-primary transition-all shadow-[0_4px_20px_rgba(0,0,0,0.04)] cursor-pointer">
<div class="flex items-center gap-md">
<div class="w-10 h-10 flex items-center justify-center bg-tertiary-container text-on-tertiary-container rounded-lg">
<span class="material-symbols-outlined">badge</span>
</div>
<span class="font-label-lg text-on-surface">Campus Student ID</span>
</div>
<input class="w-5 h-5 text-primary focus:ring-primary border-outline-variant" name="payment" type="radio"/>
</label>
</div>
</section>
<!-- Order Summary Card -->
<section class="space-y-md">
<h2 class="font-title-md text-title-md text-on-surface">Order Summary</h2>
<div class="glass-card rounded-2xl p-lg border border-white/50 shadow-lg space-y-md">
<div class="flex justify-between items-start">
<div class="flex gap-md">
<div class="w-12 h-12 rounded-xl overflow-hidden flex-shrink-0">
<img class="w-full h-full object-cover" data-alt="A high-end artisan sandwich with fresh ingredients including roasted vegetables and melted cheese, captured in a bright modern campus cafe setting with soft natural light and a clean premium aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCVLO8TONpo3Yh3_K-age6mP4P8QZnD-DV65DafA-tnHFPK2HlQJA213UrZFj3X5Ay2kakP8RBqnFSViMISYJHGIA6lvu7BIg02KPe5zD_kOS5KK1SUqT2f0HtA6mX4WSOe1AluyNDQOuGDJOqds-cYON54ZML2vjLmDmzRq7zZY6LlGaoPBZLO4rX4rtO15pz_Nb7575jb1Y3enuOJtA6Zrgo5NDksBF6HyY_VJEnHz6Qs1JA8yYwI62hyu7NkW9zw_rIoziSlkOA"/>
</div>
<div>
<p class="font-label-lg text-on-surface">Artisan Pesto Melt</p>
<p class="font-label-sm text-on-surface-variant">No onions, Extra sauce</p>
</div>
</div>
<p class="font-label-lg text-on-surface">$12.50</p>
</div>
<div class="flex justify-between items-start">
<div class="flex gap-md">
<div class="w-12 h-12 rounded-xl overflow-hidden flex-shrink-0">
<img class="w-full h-full object-cover" data-alt="A refreshing cold brew coffee in a glass bottle with clean minimalist branding, set against a bright white background with soft shadows, reflecting a modern and sophisticated campus lifestyle." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAThP0C8l2sNML3bfLvFtSRsCk1pA4COl--SggGx36fD4kk3RWlM6HU7csi8zFmoT2W63lGnzUp4pcYlDQVcBxWt7z98Enwb5GJkGTFtSOPDPtfBN9JHTzKNXiBh18936GX-r1Hafl42M88rJGvfKloBKdpRWWlSXx1hvO9gI5uCco7v83ZimYcnK2HxEsdXczkLtAarJd9cHByF0VhsFPXJabNcRDZ-Cj6LiaTwk-6_n2iG_TckViqEbjwqx8i6Ppr1Dd917wNZm8"/>
</div>
<div>
<p class="font-label-lg text-on-surface">Nitro Cold Brew</p>
<p class="font-label-sm text-on-surface-variant">Large, Oat milk</p>
</div>
</div>
<p class="font-label-lg text-on-surface">$5.75</p>
</div>
<div class="pt-md border-t border-on-surface/5 space-y-sm">
<div class="flex justify-between font-label-lg text-on-surface-variant">
<span>Subtotal</span>
<span>$18.25</span>
</div>
<div class="flex justify-between font-label-lg text-on-surface-variant">
<span>Service Fee</span>
<span>$1.50</span>
</div>
<div class="flex justify-between font-title-lg text-title-lg text-primary pt-xs">
<span>Total</span>
<span>$19.75</span>
</div>
</div>
</div>
</section>
</main>
<!-- Bottom Action Area -->
<div class="fixed bottom-0 left-0 right-0 p-md bg-surface/80 backdrop-blur-xl pb-safe z-50">
<button class="w-full bg-primary text-on-primary h-14 rounded-2xl font-title-md flex items-center justify-center gap-sm active:scale-[0.98] transition-all shadow-lg overflow-hidden group" id="confirmBtn" onclick="handleOrder()">
<span id="btnText">Confirm Order</span>
<div class="hidden" id="btnLoader">
<span class="material-symbols-outlined animate-spin text-[24px]">progress_activity</span>
</div>
</button>
</div>
<script>
        function selectTime(el) {
            document.querySelectorAll('.time-chip').forEach(btn => {
                btn.classList.remove('bg-primary', 'text-on-primary', 'shadow-sm');
                btn.classList.add('bg-surface-container-high', 'text-on-surface-variant');
            });
            el.classList.remove('bg-surface-container-high', 'text-on-surface-variant');
            el.classList.add('bg-primary', 'text-on-primary', 'shadow-sm');
        }

        function handleOrder() {
            const btn = document.getElementById('confirmBtn');
            const text = document.getElementById('btnText');
            const loader = document.getElementById('btnLoader');

            // Disable interaction
            btn.style.pointerEvents = 'none';
            text.classList.add('opacity-0');
            loader.classList.remove('hidden');
            loader.classList.add('flex');

            // Simulate loading state
            setTimeout(() => {
                text.innerText = 'Success!';
                text.classList.remove('opacity-0');
                loader.classList.add('hidden');
                btn.classList.replace('bg-primary', 'bg-tertiary');
                
                // Haptic feedback simulation or navigation could happen here
            }, 2000);
        }

        // Detect safe area for iOS
        if (window.CSS && CSS.supports('padding-bottom: env(safe-area-inset-bottom)')) {
            document.querySelector('.pb-safe').style.paddingBottom = 'calc(16px + env(safe-area-inset-bottom))';
        }
    </script>
</body></html>
