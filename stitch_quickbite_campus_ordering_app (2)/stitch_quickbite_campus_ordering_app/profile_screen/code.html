<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .premium-shimmer {
            background: linear-gradient(90deg, #feb246, #ffdbd0, #feb246);
            background-size: 200% auto;
            animation: shimmer 3s linear infinite;
        }
        @keyframes shimmer {
            to { background-position: 200% center; }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);

<body class="bg-background text-on-background min-h-screen pb-20">
<!-- Top App Bar (Mapped from Shared Component) -->
<header class="sticky top-0 w-full z-50 bg-surface/70 backdrop-blur-xl shadow-sm flex justify-between items-center px-md h-16 w-full">
<div class="flex items-center gap-md">
<button class="material-symbols-outlined text-primary active:scale-95 transition-transform" data-icon="menu">menu</button>
<h1 class="font-display-lg text-display-lg-mobile font-bold text-primary">QuickBite</h1>
</div>
<div class="flex items-center gap-md">
<button class="material-symbols-outlined text-on-surface-variant hover:opacity-80 transition-opacity" data-icon="edit">edit</button>
<div class="w-10 h-10 rounded-full bg-surface-container-high overflow-hidden border-2 border-primary-container">
<img alt="User Profile" class="w-full h-full object-cover" data-alt="A professional and friendly portrait of a young man named Alex Rivera, sitting in a modern campus cafe with soft morning sunlight. The visual style is premium and high-contrast, reflecting a modern corporate aesthetic with warm sunset orange tones. The photography is clean, sharp, and uses a shallow depth of field to emphasize the subject against a blurred architectural background." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDeG6MHXtz97S2ctG8LWoa9D2WobLsVdW52vLBz1SihvjqaD1D5pnBci6mRLtGUi25GN81i0wIicXnWDtvj4CiQhWul-Ij5UJrDFtufCLFrRaqFiU8XvqP647kNJjMhLuZfHekZa6OFZO_19HHpKkDHUtk9SHSd4k3gBp4Z0aFljQZAlQW6Wig4IZF_GJ8X95BkQ9mmJqWoNF78SmqGXrUR2R1VEjlBoCcQM_bEdZjS2CTvWIjFQALH2Fe3igagqMGTxYjBEqGccN0"/>
</div>
</div>
</header>
<main class="px-md pt-lg space-y-xl">

<div class="relative">

</div>
<div class="absolute -bottom-2 -right-2 bg-primary-container text-on-primary-container p-xs rounded-full shadow-md">
<span class="material-symbols-outlined text-[18px]" data-icon="verified" style="font-variation-settings: 'FILL' 1;">verified</span>
</div>
</div>
<div class="mt-md">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">Alex Rivera</h2>
<div class="flex items-center justify-center gap-xs mt-xs">
<span class="premium-shimmer px-3 py-1 rounded-full font-label-sm text-label-sm text-on-secondary-container flex items-center gap-xs">
<span class="material-symbols-outlined text-[14px]" data-icon="star" style="font-variation-settings: 'FILL' 1;">star</span>
                        Premium Member
                    </span>
</div>
<p class="font-body-md text-body-md text-on-surface-variant mt-sm">alex.rivera@campus.edu</p>
</div>
</section>
<!-- Main Options Grid/List -->
<section class="space-y-md">
<h3 class="font-title-md text-title-md text-on-surface-variant px-xs">My Activity</h3>
<div class="grid grid-cols-1 gap-sm">
<!-- Order History -->
<button class="flex items-center justify-between p-md bg-surface-container-lowest rounded-xl shadow-[0_4px_20px_rgba(0,0,0,0.04)] active:scale-[0.98] transition-all hover:bg-surface-container-low group">

<div class="w-12 h-12 rounded-xl bg-primary/10 flex items-center justify-center text-primary">

</div>

</div>

</button>

<div class="w-12 h-12 rounded-xl bg-tertiary-container/20 flex items-center justify-center text-tertiary">
<span class="material-symbols-outlined" data-icon="rate_review">rate_review</span>
</div>
<span class="font-title-md text-title-md text-on-surface">My Reviews</span>
</div>
<span class="material-symbols-outlined text-on-surface-variant group-hover:translate-x-1 transition-transform" data-icon="chevron_right">chevron_right</span>
</button>
</div>
</section>

</div>

</button>
<!-- Settings -->

<div class="flex items-center gap-md">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="settings">settings</span>
<span class="font-body-lg text-body-lg text-on-surface">Settings</span>
</div>
<span class="material-symbols-outlined text-on-surface-variant group-hover:translate-x-1 transition-transform" data-icon="chevron_right">chevron_right</span>
</button>

<span class="material-symbols-outlined text-error" data-icon="logout">logout</span>

</div>

<span class="material-symbols-outlined text-4xl text-primary" data-icon="restaurant">restaurant</span>
<p class="font-label-sm text-label-sm text-on-surface-variant mt-sm">QuickBite v2.4.0 • Campus Elite</p>
</div>

<span class="material-symbols-outlined" data-icon="home">home</span>

<span class="material-symbols-outlined" data-icon="receipt_long">receipt_long</span>
<span class="font-label-sm text-label-sm">Orders</span>
</a>
<!-- Favorites -->
<a class="flex flex-col items-center justify-center text-on-surface-variant px-5 py-1 hover:bg-surface-container-high transition-colors active:scale-90" href="#">
<span class="material-symbols-outlined" data-icon="favorite">favorite</span>
<span class="font-label-sm text-label-sm">Favorites</span>
</a>
<!-- Profile (Active) -->
<a class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-full px-5 py-1 active:scale-90 transition-transform" href="#">
<span class="material-symbols-outlined" data-icon="person" style="font-variation-settings: 'FILL' 1;">person</span>
<span class="font-label-sm text-label-sm">Profile</span>
</a>
</nav>
<script>
        // Micro-interaction for feedback
        document.querySelectorAll('button, a').forEach(elem => {
            elem.addEventListener('touchstart', () => {
                elem.classList.add('opacity-70');
            });
            elem.addEventListener('touchend', () => {
                elem.classList.remove('opacity-70');
            });
        });
    </script>
