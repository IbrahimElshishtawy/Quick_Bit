<style>
    body {
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    .onboarding-canvas {
      height: 100dvh;
      max-width: 480px;
      margin: 0 auto;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      background-color: #ffffff;
    }
    .image-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      background: linear-gradient(180deg, #FFF9F7 0%, #FFFFFF 100%);
      padding: 24px;
    }
    .content-container {
      padding: 32px 24px;
      background-color: #ffffff;
      border-top-left-radius: 32px;
      border-top-right-radius: 32px;
      box-shadow: 0 -10px 40px rgba(0,0,0,0.03);
    }
    .progress-dots {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 32px;
    }
    .dot {
      height: 8px;
      border-radius: 4px;
      transition: all 0.3s ease;
    }
    .dot-inactive {
      width: 8px;
      background-color: #E2E2E5;
    }
    .dot-active {
      width: 24px;
      background-color: #ab3500;
    }
    .cta-button {
      background-color: #ab3500;
      color: white;
      height: 56px;
      border-radius: 16px;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      transition: transform 0.1s active;
    }
    .cta-button:active {
      transform: scale(0.98);
    }
    .illustration-blob {
      position: absolute;
      width: 280px;
      height: 280px;
      background: radial-gradient(circle, rgba(255,107,53,0.1) 0%, rgba(255,255,255,0) 70%);
      z-index: 0;
    }
  </style>
</head>
<body class="bg-surface-container-low">
<main class="onboarding-canvas relative shadow-2xl">
<!-- Top App Bar (Simplified for Onboarding) -->
<header class="flex justify-between items-center px-lg h-16 w-full z-50">
<div class="font-display-lg text-headline-lg-mobile font-bold text-primary">QuickBite</div>
<button class="font-label-lg text-label-lg text-on-surface-variant hover:opacity-80 transition-opacity">Skip</button>
</header>
<!-- Visual Area -->
<div class="image-container">
<div class="illustration-blob"></div>
<div class="relative z-10 w-full flex justify-center items-center">
<!-- Main Illustration Image -->
<div class="w-full max-w-[320px] rounded-3xl overflow-hidden shadow-xl transform rotate-1">
<img alt="3D Illustration of a modern automated food pickup locker" class="w-full h-auto object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDpla3luMigxPzC8P99rFvDvANDszNpwIt-8GyZkmi2y5oudoW-hMf5LhOLbAMWxo_0i4To63xTR3LM1i5WVJt9wYQ1tN0royh0zs8lJ8phRNWkFDEfB81uoAEv6mtbwfWJn_eikh1ImVBPBE9FwRrZau1wHrD9xii8tnc-J4hh1aLFTyEQEj7x8wtDweoL2H9ZsiOVmzmEoVPfZX9fn6guSAGqZQFqRhnF-jYeBP3JSMAhjnBbhNqxAC-YXF1Q4eag6gW3ClurmBY"/>
</div>
<!-- Floating Elements for Depth -->
<div class="absolute -top-4 -right-4 bg-white p-3 rounded-2xl shadow-lg border border-surface-container-high animate-bounce" style="animation-duration: 3s;">
<span class="material-symbols-outlined text-primary text-[32px]">qr_code_2</span>
</div>
<div class="absolute -bottom-2 -left-2 bg-white p-3 rounded-2xl shadow-lg border border-surface-container-high animate-pulse" style="animation-duration: 4s;">
<span class="material-symbols-outlined text-secondary text-[28px]">schedule</span>
</div>
</div>
</div>
<!-- Content Area -->
<section class="content-container">
<!-- Progress Indicator -->
<div class="progress-dots">
<div class="dot dot-inactive"></div>
<div class="dot dot-inactive"></div>
<div class="dot dot-active"></div>
</div>
<!-- Typography -->
<div class="space-y-md mb-xl text-center">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">
          Pick up without waiting.
        </h1>
<p class="font-body-lg text-body-lg text-on-surface-variant leading-relaxed px-sm">
          Receive a unique pickup code and collect your order at your selected time. No more queues!
        </p>
</div>
<!-- Primary Action -->
<div class="space-y-md">
<button class="cta-button font-title-md text-title-md shadow-lg shadow-primary/20">
          Get Started
        </button>
<p class="text-center font-label-sm text-label-sm text-on-surface-variant/60">
          Step 3 of 3 • Powered by Modern Campus Tech
        </p>
</div>
</section>
</main>
<script>
    // Micro-interactions for button
    const btn = document.querySelector('.cta-button');
    btn.addEventListener('click', () => {
      console.log('Onboarding Complete - Navigating to Home');
      // Potential animation before transition
      btn.innerHTML = '<span class="material-symbols-outlined animate-spin">refresh</span>';
      setTimeout(() => {
        // In a real app, this would route to the Home screen
        btn.innerHTML = 'Welcome!';
      }, 800);
    });

    // Subtle parallax or entrance animations
    document.addEventListener('DOMContentLoaded', () => {
      const content = document.querySelector('.content-container');
      content.style.opacity = '0';
      content.style.transform = 'translateY(20px)';
      
      setTimeout(() => {
        content.style.transition = 'all 0.6s cubic-bezier(0.22, 1, 0.36, 1)';
        content.style.opacity = '1';
        content.style.transform = 'translateY(0)';
      }, 100);
    });
  </script>
</body></html>
