<style>
        body {
            background-color: #F8F9FA;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }
        .onboarding-gradient {
            background: radial-gradient(circle at top right, rgba(255, 107, 53, 0.08) 0%, transparent 40%),
                        radial-gradient(circle at bottom left, rgba(0, 103, 126, 0.05) 0%, transparent 40%);
        }
        .floating {
            animation: floating 6s ease-in-out infinite;
        }
        @keyframes floating {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        .blob {
            position: absolute;
            width: 300px;
            height: 300px;
            background: #ff6b35;
            filter: blur(100px);
            opacity: 0.1;
            z-index: 0;
            border-radius: 50%;
        }
    </style>

<body class="flex items-center justify-center min-h-screen onboarding-gradient">
<!-- Main Onboarding Container (Mobile Size) -->
<main class="relative w-full max-w-[430px] h-screen max-h-[932px] bg-background shadow-2xl overflow-hidden flex flex-col md:rounded-[3rem] border-8 border-surface-container">
<!-- Blobs for Atmosphere -->
<div class="blob top-[-50px] right-[-50px]"></div>
<div class="blob bottom-[-50px] left-[-50px]"></div>
<!-- Top Navigation -->
<div class="sticky top-0 z-50 flex justify-end items-center px-lg h-16 w-full">
<button class="font-label-lg text-label-lg text-on-surface-variant hover:text-primary transition-colors px-md py-sm">
                Skip
            </button>
</div>
<!-- Scrollable Content Area -->
<div class="flex-1 flex flex-col items-center justify-between px-lg pb-xl relative z-10">
<!-- Hero Visual Area -->
<div class="flex-1 w-full flex items-center justify-center py-lg relative">
<div class="relative w-full aspect-square max-h-[400px] flex items-center justify-center">
<!-- Glassmorphism Container for 3D Asset -->
<div class="absolute inset-0 bg-white/40 backdrop-blur-3xl rounded-full scale-90 -z-10"></div>
<div class="floating w-full h-full flex items-center justify-center">
<img alt="3D Smart Ordering System Illustration" class="w-full h-full object-contain" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCCapxMjTjhOlSaaCQzbHt8ZsTqYT2vQmwuTUanLjsiaUybyhtvezUFX9O3eN_ZoP4xFOyPf4V5ziNJmj-EZ-Pz_9m6u1aDq0xiteYysbZZKl5Ar_GjNU_tCWYvRIq6pNq3kPABOhXvtJ0fpHGsyD7aeLGlTpDxafjfcxVH0jqOVo0_BHB-KZnM9PlzAWKTKG0DC_RGxXqLwhrGR8E9ETs-n-sIdkZbN8Q7-DI2vtAJrvQ5YhrHi8_fgTr-Il90D2KovG_irPBlNUw"/>
</div>
</div>
</div>
<!-- Content Section -->
<div class="w-full text-center space-y-md">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">
                    Order in seconds
                </h1>
<p class="font-body-lg text-body-lg text-on-surface-variant px-md">
                    Browse menus, customize your meals, and pay securely right from your phone.
                </p>
</div>
<!-- Bottom Action Area -->
<div class="w-full mt-xl space-y-lg">
<!-- Progress Indicator -->
<div class="flex justify-center items-center gap-xs">
<div class="w-2 h-2 rounded-full bg-outline-variant"></div>
<div class="w-6 h-2 rounded-full bg-primary transition-all duration-300"></div>
<div class="w-2 h-2 rounded-full bg-outline-variant"></div>
</div>
<!-- Navigation Button -->
<button class="w-full h-[64px] bg-primary-container text-on-primary-container font-title-lg text-title-lg rounded-[20px] flex items-center justify-between px-lg shadow-lg hover:brightness-105 active:scale-95 transition-all group">
<span>Next</span>
<div class="flex items-center justify-center w-10 h-10 bg-on-primary-container/10 rounded-full group-hover:translate-x-1 transition-transform">
<span class="material-symbols-outlined text-on-primary-container">arrow_forward</span>
</div>
</button>
</div>
</div>
<!-- Home Indicator (iOS Style) -->
<div class="w-full h-8 flex items-center justify-center pb-xs">
<div class="w-32 h-1 bg-surface-container-highest rounded-full"></div>
</div>
</main>
<script>
        // Micro-interaction for the Next button
        const nextBtn = document.querySelector('button.group');
        nextBtn.addEventListener('click', () => {
            nextBtn.classList.add('opacity-50');
            setTimeout(() => {
                nextBtn.classList.remove('opacity-50');
                // Logic to go to next screen would go here
            }, 200);
        });

        // Simple parallax effect for blobs
        document.addEventListener('mousemove', (e) => {
            const blobs = document.querySelectorAll('.blob');
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            
            blobs.forEach((blob, index) => {
                const speed = (index + 1) * 20;
                blob.style.transform = `translate(${x * speed}px, ${y * speed}px)`;
            });
        });
    </script>
